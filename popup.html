<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 220px; 
      padding: 15px; 
      font-family: 'Courier New', monospace; 
      background-color: #FFDE59; 
      border: 4px solid #000;
      margin: 0;
    }
    h3 { 
      margin-top: 0;
      margin-bottom: 15px; 
      color: #000; 
      text-transform: uppercase;
      font-weight: 900;
      border-bottom: 3px solid #000;
      padding-bottom: 5px;
    }
    button { 
      width: 100%; 
      padding: 12px; 
      cursor: pointer; 
      background-color: #5CE1E6; 
      color: #000; 
      border: 3px solid #000; 
      font-weight: 900;
      text-transform: uppercase;
      box-shadow: 4px 4px 0px #000;
      transition: all 0.1s;
    }
    button:active {
      box-shadow: 0px 0px 0px #000;
      transform: translate(4px, 4px);
    }
    p { 
      font-size: 11px; 
      color: #000; 
      margin-top: 15px; 
      font-weight: 700;
      background: #FFF;
      padding: 5px;
      border: 2px solid #000;
    }
  </style>
</head>
<body>
  <h3 data-i18n="appName">GMeet Attendance</h3>
  <button id="openDashboard" data-i18n="viewAttendance">View Attendance</button>
  <p data-i18n="tip">Tip: Keep the "People" panel open in Google Meet to ensure all participants are tracked.</p>
  <script src="popup.js"></script>
</body>
</html>
