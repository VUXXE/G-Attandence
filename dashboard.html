<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title data-i18n="dashboardTitle">Google Meet Attendance Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 data-i18n="appName">Google Meet Attendance</h1>
      <div class="actions">
        <button id="savePdf" data-i18n="savePdf">Save as PDF</button>
        <button id="saveCsv" data-i18n="saveCsv">Save as CSV</button>
        <button id="clearData" data-i18n="clearData">Clear All Data</button>
      </div>
    </header>
    <div id="meetingList"></div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
